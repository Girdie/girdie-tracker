<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Girdie Golf Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f2f4f8; --surface: #ffffff; --surface2: #eaecf4;
  --border: #d0d4e8; --border-focus: #2ab8d0;
  --green: #1a2040; --green-mid: #2a3060; --green-light: #eaecf4; --green-btn: #2a3060;
  --gold: #e87820; --gold-light: #fff4e8; --gold-btn: #d06818;
  --blue: #2ab8d0; --blue-light: #e8f8fc; --blue-btn: #1aa8c0;
  --purple: #7adf1a; --purple-light: #f0ffe8; --purple-btn: #60c010;
  --text: #1a2040; --text-mid: #4a5070; --text-dim: #8a90a8;
  --error: #cc3333; --error-bg: #fff0f0; --error-border: #ffcccc;
  --warning: #cc8800; --warning-bg: #fff8e0; --warning-border: #ffe0a0;
  --success: #1a8040; --success-bg: #e8f5ee; --success-border: #a8d8b8;
  --white: #ffffff;
  --shadow: 0 2px 8px rgba(26,32,64,0.08); --shadow-lg: 0 4px 16px rgba(26,32,64,0.12);
  --radius: 12px; --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { font-size: 16px; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
.topbar { background: #1a2040; padding: 14px 16px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(26,32,64,0.3); }
.topbar-logo { width: 40px; height: 40px; background: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 2px 6px rgba(0,0,0,0.2); overflow: hidden; padding: 3px; }
.topbar-logo img { width: 100%; height: 100%; object-fit: contain; }
.topbar-title { font-family: 'Playfair Display', serif; font-size: 18px; color: white; font-weight: 700; }
.topbar-sub { font-size: 11px; color: rgba(255,255,255,0.7); letter-spacing: 0.1em; margin-top: 1px; text-transform: uppercase; }
.topbar-info { margin-left: auto; text-align: right; }
.topbar-name { color: white; font-size: 13px; font-weight: 600; }
.topbar-detail { color: rgba(255,255,255,0.7); font-size: 11px; margin-top: 1px; }
.save-bar { background: #1a2040; border-bottom: 2px solid var(--border); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; font-size: 12px; font-weight: 600; letter-spacing: 0.04em; position: sticky; top: 64px; z-index: 99; }
.save-indicator { display: flex; align-items: center; gap: 6px; color: rgba(255,255,255,0.7); }
.save-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-dim); transition: background 0.3s; flex-shrink: 0; }
.save-dot.saved { background: var(--success); }
.save-dot.saving { background: var(--gold); animation: pulse 1s infinite; }
.save-dot.error { background: var(--error); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.sheets-badge { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; padding: 5px 12px; border-radius: 20px; background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.6); }
.sheets-badge.ok { background: #2d7a2d; color: #ffffff; }
.sheets-badge.pending { background: #8a6000; color: #ffffff; }
.sheets-badge.fail { background: #8a2020; color: #ffffff; }
.main { padding: 16px; max-width: 560px; margin: 0 auto; padding-bottom: 48px; }
.card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px; margin-bottom: 16px; }
.section-title { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; color: #2ab8d0; text-transform: uppercase; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 2px solid var(--green-light); }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; min-width: 0; }
.field { display: flex; flex-direction: column; gap: 5px; min-width: 0; overflow: hidden; }
.field label { font-size: 11px; font-weight: 600; color: var(--text-mid); letter-spacing: 0.05em; }
.field input, .field select { width: 100%; min-width: 0; background: var(--bg); border: 2px solid var(--border); border-radius: var(--radius-sm); color: var(--text); padding: 11px 12px; font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; transition: border-color 0.2s, background 0.2s; box-sizing: border-box; height: 48px; -webkit-appearance: none; appearance: none; }
.field input:focus, .field select:focus { border-color: var(--green); background: white; }
.group-card { background: var(--bg); border: 2px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; transition: border-color 0.2s, box-shadow 0.2s; }
.group-card.filled { border-color: var(--green-mid); background: white; box-shadow: var(--shadow); }
.group-card.has-warning { border-color: var(--warning); }
.group-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.group-num { width: 32px; height: 32px; background: var(--green); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: 13px; font-weight: 700; flex-shrink: 0; }
.group-time { flex: 1; background: var(--bg); border: 2px solid var(--border); border-radius: var(--radius-sm); color: var(--text); padding: 10px 12px; font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; transition: border-color 0.2s; }
.group-time:focus { border-color: var(--green); background: white; }
.remove-btn { width: 34px; height: 34px; background: none; border: 2px solid var(--border); border-radius: 8px; color: var(--text-dim); cursor: pointer; font-size: 18px; touch-action: manipulation; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
.remove-btn:hover { border-color: var(--error); color: var(--error); background: var(--error-bg); }
.group-warning { background: var(--warning-bg); border: 1px solid var(--warning-border); border-radius: 6px; padding: 6px 10px; margin-bottom: 10px; font-size: 12px; color: var(--warning); font-weight: 500; display: none; }
.group-warning.show { display: block; }
.sel-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.sel-group { display: flex; flex-direction: column; gap: 5px; }
.sel-label { font-size: 11px; font-weight: 600; color: var(--text-mid); letter-spacing: 0.04em; }
.sel-btns { display: flex; gap: 4px; }
.sel-btn { flex: 1; height: 48px; background: var(--bg); border: 2px solid var(--border); border-radius: 8px; color: var(--text-dim); font-size: 17px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.12s; padding: 0; touch-action: manipulation; display: flex; align-items: center; justify-content: center; }
.sel-btn:active { transform: scale(0.88); }
.sel-btn.sel-green.active, .sel-btn.sel-gold.active, .sel-btn.sel-blue.active, .sel-btn.sel-purple.active { background: #2ab8d0; border-color: #2ab8d0; color: white; box-shadow: 0 2px 6px rgba(42,184,208,0.35); }
.notes-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.notes-input { width: 100%; background: var(--bg); border: 2px solid var(--border); border-radius: var(--radius-sm); color: var(--text); padding: 10px 12px; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s; }
.notes-input:focus { border-color: var(--green); background: white; }
.group-actions { display: flex; gap: 10px; margin-top: 4px; }
.add-btn { flex: 1; padding: 13px; background: white; border: 2px dashed var(--border); border-radius: var(--radius); color: var(--green); cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; transition: all 0.2s; }
.add-btn:hover { border-color: var(--green); background: var(--green-light); }
.dupe-btn { padding: 13px 16px; background: white; border: 2px solid var(--border); border-radius: var(--radius); color: var(--text-mid); cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; transition: all 0.2s; white-space: nowrap; }
.dupe-btn:hover { border-color: var(--green); color: var(--green); background: var(--green-light); }
.banner { border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 12px; font-size: 13px; font-weight: 500; display: flex; align-items: flex-start; gap: 8px; }
.banner.error { background: var(--error-bg); border: 1px solid var(--error-border); color: var(--error); }
.banner.warning { background: var(--warning-bg); border: 1px solid var(--warning-border); color: var(--warning); }
.banner.success { background: var(--success-bg); border: 1px solid var(--success-border); color: var(--success); }
.action-row { display: flex; gap: 10px; margin-top: 16px; }
.btn { flex: 1; padding: 16px; border: none; border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; touch-action: manipulation; }
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--green); color: white; box-shadow: 0 3px 10px rgba(45,122,45,0.3); }
.btn-primary:hover { background: var(--green-btn); }
.btn-primary.success-state { background: #2a6a2a; }
.btn-primary.error-state { background: #aa2222; }
.btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
.btn-secondary { background: var(--surface2); color: var(--text-mid); border: 2px solid var(--border); }
.shift-id-box { background: var(--blue-light); border: 1px solid #c0d0f0; border-radius: var(--radius-sm); padding: 8px 12px; font-size: 11px; color: var(--blue); margin-top: 8px; display: flex; align-items: center; gap: 6px; }
@media (max-width: 420px) { .row2 { grid-template-columns: 1fr; gap: 8px; } .main { padding: 12px; } .card { padding: 14px; } }
</style>
</head>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwNyIZNDPrlKwSVjDCxtJUztcwKEwgNxi3cm1GTR8lqLmIWsFXyx5_Tnq604ICcxAs/exec";
const STORAGE_KEY = "girdie_shift_v2";
let state = { header:{staffName:"",course:"",date:todayStr(),station:"",startTime:"",endTime:"",donations:"",giftCardsStart:"",giftCardsEnd:""}, groups:[], sheetsSubmitted:false, lastSaved:null, shiftId:null };
let groupIdCounter=0, localSaveTimer=null, autoSubmitTimer=null, _sheetSyncTimer=null, _submitting=false;
let _isScrolling=false, _scrollTimer=null;
window.addEventListener('scroll',function(){_isScrolling=true;clearTimeout(_scrollTimer);_scrollTimer=setTimeout(()=>{_isScrolling=false;},150);},true);
function todayStr(){return new Date().toISOString().split("T")[0];}
function buildShiftId(h){if(!h.staffName||!h.course||!h.date)return null;return[h.staffName.trim().toLowerCase(),h.course.trim().toLowerCase(),h.date,h.station||''].join("_").replace(/\s+/g,"_");}
window.onload=function(){loadFromLocal();if(state.groups.length===0){for(let i=0;i<10;i++)state.groups.push(newGroup());}renderAll();scheduleAutoSubmit();};
function saveToLocal(){try{state.lastSaved=new Date().toISOString();localStorage.setItem(STORAGE_KEY,JSON.stringify(state));setLocalStatus("saved");}catch(e){setLocalStatus("error");}}
function loadFromLocal(){try{const raw=localStorage.getItem(STORAGE_KEY);if(!raw)return;const saved=JSON.parse(raw);state={...state,...saved};if(state.groups&&state.groups.length>0){const maxId=Math.max(...state.groups.map(g=>g.id||0));groupIdCounter=maxId+1;}const h=state.header;["staffName","course","date","station","startTime","endTime","donations","giftCardsStart","giftCardsEnd"].forEach(id=>{const el=document.getElementById(id);if(el)el.value=h[id]||"";}); document.getElementById("date").value=h.date||todayStr();if(state.lastSaved)setLocalStatus("saved");if(state.sheetsSubmitted)setSheetsStatus("ok","✓ Saved to Sheets");}catch(e){}}
function debounceSave(){setLocalStatus("saving");clearTimeout(localSaveTimer);localSaveTimer=setTimeout(saveToLocal,600);}
function setLocalStatus(s){const dot=document.getElementById("localDot");const lbl=document.getElementById("localStatus");dot.className="save-dot "+s;if(s==="saved"){const t=state.lastSaved?new Date(state.lastSaved):new Date();lbl.style.color="var(--success)";lbl.textContent="Saved "+t.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});}else if(s==="saving"){lbl.style.color="var(--gold)";lbl.textContent="Saving...";}else{lbl.style.color="var(--error)";lbl.textContent="Save error";}}
function setSheetsStatus(type,msg){const el=document.getElementById("sheetsBadge");el.className="sheets-badge "+type;el.textContent="Sheets: "+msg;}
function newGroup(){return{id:groupIdCounter++,time:"",golfers:null,paying:null,cash:null,electronic:null,hitGreen:null,notes:""};}
function addGroup(){state.groups.push(newGroup());renderGroups();debounceSave();setTimeout(()=>window.scrollTo({top:document.body.scrollHeight,behavior:"smooth"}),50);}
function duplicateLast(){const filled=state.groups.filter(g=>g.golfers!==null||g.paying!==null||g.cash!==null||g.electronic!==null);if(filled.length===0){showError("No groups to duplicate yet.");return;}const last=filled[filled.length-1];const dupe={...last,id:groupIdCounter++,time:"",notes:""};state.groups.push(dupe);renderGroups();debounceSave();setTimeout(()=>window.scrollTo({top:document.body.scrollHeight,behavior:"smooth"}),50);}
function removeGroup(id){state.groups=state.groups.filter(g=>g.id!==id);renderGroups();debounceSave();}
function setGroupField(id,field,val){const g=state.groups.find(g=>g.id===id);if(!g)return;g[field]=val;refreshGroupCard(id);debounceSave();debounceSheetSync();}
function toggleSel(id,field,val,color){if(_isScrolling)return;const g=state.groups.find(g=>g.id===id);if(!g)return;g[field]=g[field]===val?null:val;const btns=document.querySelectorAll(`[data-gid="${id}"][data-field="${field}"]`);btns.forEach(btn=>{const n=parseInt(btn.dataset.val);btn.className=`sel-btn sel-${color}`+(g[field]===n?" active":"");});refreshGroupCard(id);validateGroup(id);updateGroupCount();debounceSave();debounceSheetSync();}
function validateGroup(id){const g=state.groups.find(g=>g.id===id);if(!g)return;const warn=document.getElementById("warn_"+id);const card=document.getElementById("card_"+id);if(!warn||!card)return;const msgs=[];if(g.paying!==null&&g.golfers!==null&&g.paying>g.golfers)msgs.push("# Paying can't exceed # Golfers");if(g.cash!==null&&g.electronic!==null&&g.paying!==null&&(g.cash+g.electronic)>g.paying)msgs.push("Cash + Electronic can't exceed # Paying");if(msgs.length>0){warn.textContent="⚠ "+msgs.join(" · ");warn.classList.add("show");card.classList.add("has-warning");}else{warn.classList.remove("show");card.classList.remove("has-warning");}}
function refreshGroupCard(id){const g=state.groups.find(g=>g.id===id);if(!g)return;const card=document.getElementById("card_"+id);if(!card)return;const filled=g.golfers!==null||g.paying!==null||g.cash!==null||g.electronic!==null;card.classList.toggle("filled",filled);}
function updateGroupCount(){const filled=state.groups.filter(g=>g.golfers!==null||g.paying!==null||g.cash!==null||g.electronic!==null);document.getElementById("groupCount").textContent=filled.length;}
function renderGroups(){const container=document.getElementById("groupsContainer");container.innerHTML="";updateGroupCount();state.groups.forEach((g,i)=>{const isFilled=g.golfers!==null||g.paying!==null||g.cash!==null||g.electronic!==null;const hasWarn=(g.paying!==null&&g.golfers!==null&&g.paying>g.golfers)||(g.cash!==null&&g.electronic!==null&&g.paying!==null&&(g.cash+g.electronic)>g.paying);const card=document.createElement("div");card.className="group-card"+(isFilled?" filled":"")+(hasWarn?" has-warning":"");card.id="card_"+g.id;card.innerHTML=`<div class="group-header"><div class="group-num">${i+1}</div><div style="flex:1;min-width:0;"><div style="font-size:10px;font-weight:600;color:var(--text-mid);letter-spacing:0.05em;margin-bottom:3px;">GROUP TIME</div><input class="group-time" type="time" value="${g.time||""}" onchange="setGroupField(${g.id},'time',this.value)" placeholder="--:-- --"></div><button class="remove-btn" onclick="removeGroup(${g.id})">×</button></div><div class="group-warning${hasWarn?' show':''}" id="warn_${g.id}"></div><div class="sel-row">${selGroup(g.id,"golfers","# Golfers","green",g.golfers)}${selGroup(g.id,"paying","# Paying","green",g.paying)}</div><div class="sel-row">${selGroup(g.id,"cash","# Paid Cash","gold",g.cash)}${selGroup(g.id,"electronic","# Paid Electronic","blue",g.electronic)}</div><div class="notes-row">${selGroup(g.id,"hitGreen","# Hit the Green","purple",g.hitGreen)}<div class="sel-group"><div class="sel-label">Notes</div><input class="notes-input" type="text" value="${(g.notes||"").replace(/"/g,'&quot;')}" placeholder="Optional" oninput="setGroupField(${g.id},'notes',this.value)"></div></div>`;container.appendChild(card);if(hasWarn){const msgs=[];if(g.paying>g.golfers)msgs.push("# Paying can't exceed # Golfers");if((g.cash+g.electronic)>g.paying)msgs.push("Cash + Electronic can't exceed # Paying");document.getElementById("warn_"+g.id).textContent="⚠ "+msgs.join(" · ");}}); }
function selGroup(gid,field,label,color,current){const btns=[0,1,2,3,4].map(n=>{const active=current===n?" active":"";return `<button class="sel-btn sel-${color}${active}" data-gid="${gid}" data-field="${field}" data-val="${n}" onclick="toggleSel(${gid},'${field}',${n},'${color}')">${n}</button>`;}). join("");return `<div class="sel-group"><div class="sel-label">${label}</div><div class="sel-btns">${btns}</div></div>`;}
function onHeaderChange(){const h=state.header;h.staffName=document.getElementById("staffName").value;h.course=document.getElementById("course").value;h.date=document.getElementById("date").value;h.station=document.getElementById("station").value;h.startTime=document.getElementById("startTime").value;h.endTime=document.getElementById("endTime").value;h.donations=document.getElementById("donations").value;h.giftCardsStart=document.getElementById("giftCardsStart").value;h.giftCardsEnd=document.getElementById("giftCardsEnd").value;state.shiftId=buildShiftId(h);const idBox=document.getElementById("shiftIdBox");const idLabel=document.getElementById("shiftIdLabel");if(state.shiftId){idBox.style.display="flex";idLabel.textContent=state.shiftId;}else{idBox.style.display="none";}updateTopbar();debounceSave();debounceSheetSync();}
function updateTopbar(){const h=state.header;const info=document.getElementById("topbarInfo");if(h.staffName||h.course){info.style.display="block";document.getElementById("topbarName").textContent=h.staffName||"—";document.getElementById("topbarDetail").textContent=(h.course||"—")+(h.station?" · Hole "+h.station:"");}else{info.style.display="none";}}
function computeTotals(){return state.groups.reduce((acc,g)=>{return{golfers:acc.golfers+(g.golfers??0),paying:acc.paying+(g.paying??0),cash:acc.cash+(g.cash??0),electronic:acc.electronic+(g.electronic??0),greenHits:acc.greenHits+(g.hitGreen??0)};} ,{golfers:0,paying:0,cash:0,electronic:0,greenHits:0});}
function renderAll(){renderGroups();updateTopbar();onHeaderChange();}
function runValidation(){const issues=[];state.groups.forEach((g,i)=>{if(g.paying!==null&&g.golfers!==null&&g.paying>g.golfers)issues.push(`Group ${i+1}: Paying > Golfers`);if(g.cash!==null&&g.electronic!==null&&g.paying!==null&&(g.cash+g.electronic)>g.paying)issues.push(`Group ${i+1}: Cash+Electronic > Paying`);}); const vBanner=document.getElementById("validationBanner");const vMsg=document.getElementById("validationMsg");if(issues.length>0){vMsg.textContent=issues.join(" · ");vBanner.style.display="flex";return false;}vBanner.style.display="none";return true;}
function buildPayload(isBackground){const t=computeTotals();const h=state.header;const notes=state.groups.filter(g=>g.notes&&g.notes.trim()).map((g,i)=>"Grp "+(i+1)+": "+g.notes.trim()).join(" | ");const filledGroups=state.groups.filter(g=>g.golfers!==null||g.paying!==null||g.cash!==null||g.electronic!==null||g.time).map((g,i)=>{return{groupNum:i+1,time:g.time||"",golfers:g.golfers??0,paying:g.paying??0,cash:g.cash??0,electronic:g.electronic??0,hitGreen:g.hitGreen??0,notes:g.notes||""};}); return{staffName:h.staffName,course:h.course,date:h.date,station:h.station,startTime:h.startTime,endTime:h.endTime,golfers:t.golfers,paying:t.paying,cash:t.cash,electronic:t.electronic,greenHits:t.greenHits,donations:parseFloat(h.donations)||0,holeInOne:0,notes:notes,shiftId:state.shiftId||"",isBackground:isBackground||false,groups:filledGroups,giftCardsStart:parseInt(h.giftCardsStart)||0,giftCardsEnd:parseInt(h.giftCardsEnd)||0,giftCardsUsed:(parseInt(h.giftCardsStart)||0)-(parseInt(h.giftCardsEnd)||0)};}
function sendToSheets(isBackground,onSuccess,onError){if(_submitting&&!isBackground)return;_submitting=true;const payload=buildPayload(isBackground);const encoded=encodeURIComponent(JSON.stringify(payload));const url=APPS_SCRIPT_URL+"?data="+encoded;setSheetsStatus("pending","Submitting...");const img=new Image();let resolved=false;const resolve=(success)=>{if(resolved)return;resolved=true;_submitting=false;if(success){onSuccess&&onSuccess();}else{onError&&onError();}};img.onload=()=>resolve(true);img.onerror=()=>{resolve(true);};setTimeout(()=>resolve(true),8000);img.src=url;}
function submitToSheets(){const h=state.header;if(!h.staffName||!h.course||!h.date){showError("Please fill in Staff Name, Course, and Date before submitting.");return;}if(!runValidation())return;hideError();const btn=document.getElementById("submitBtn");btn.disabled=true;btn.textContent="⏳ Saving...";btn.className="btn btn-primary";sendToSheets(false,()=>{state.sheetsSubmitted=true;saveToLocal();setSheetsStatus("ok","✓ Saved to Sheets");btn.textContent="✓ Saved to Sheets!";btn.className="btn btn-primary success-state";btn.disabled=false;},()=>{setSheetsStatus("fail","Error");btn.textContent="✗ Retry";btn.className="btn btn-primary error-state";btn.disabled=false;showError("Could not reach Sheets. Try again.");}); }
function debounceSheetSync(){const h=state.header;if(!h.staffName||!h.course||!h.date)return;clearTimeout(_sheetSyncTimer);_sheetSyncTimer=setTimeout(()=>{sendToSheets(true,()=>setSheetsStatus("ok","✓ Saved to Sheets"),()=>setSheetsStatus("fail","⚠ Not Saved!"));},3000);}
function scheduleAutoSubmit(){clearInterval(autoSubmitTimer);autoSubmitTimer=setInterval(()=>{const h=state.header;if(!h.staffName||!h.course||!h.date)return;sendToSheets(true,()=>setSheetsStatus("ok","✓ Saved to Sheets"),()=>{}); },30000);}
function newShift(){if(!confirm("Start a new shift? This will clear all current data."))return;localStorage.removeItem(STORAGE_KEY);groupIdCounter=0;state={header:{staffName:"",course:"",date:todayStr(),station:"",startTime:"",endTime:"",donations:"",giftCardsStart:"",giftCardsEnd:""},groups:[],sheetsSubmitted:false,lastSaved:null,shiftId:null};for(let i=0;i<10;i++)state.groups.push(newGroup());["staffName","station","startTime","endTime","donations","giftCardsStart","giftCardsEnd"].forEach(id=>{const el=document.getElementById(id);if(el)el.value="";}); document.getElementById("course").value="";document.getElementById("date").value=todayStr();const btn=document.getElementById("submitBtn");btn.textContent="Submit to Sheets";btn.className="btn btn-primary";btn.disabled=false;const sib=document.getElementById("shiftIdBox");if(sib)sib.style.display="none";setSheetsStatus("pending","Not Saved Yet");setLocalStatus("saving");renderAll();}
function showError(msg){document.getElementById("errorMsg").textContent=msg;document.getElementById("errorBanner").style.display="flex";}
function hideError(){document.getElementById("errorBanner").style.display="none";}
</script>
</body>
